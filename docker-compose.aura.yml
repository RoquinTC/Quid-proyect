# ============================================================
# Aura IA + Ollama — Docker Compose (Bajo Demanda)
# ============================================================
# Este archivo se usa SOLAMENTE cuando quieres usar Aura IA.
# Se levanta con: docker compose -f docker-compose.aura.yml up -d
# Se detiene con: docker compose -f docker-compose.aura.yml down
#
# NOTA: Ollama en Docker solo usa CPU (lento).
# Si tienes GPU NVIDIA en Windows, mejor ejecuta Ollama nativo
# y usa docker-compose.aura-native.yml en su lugar.
# ============================================================

services:
  aura-ia:
    build:
      context: ./Aura-IA
      dockerfile: Dockerfile
    container_name: aura-ia
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ALLOWED_USER_IDS=${TELEGRAM_ALLOWED_USER_IDS}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GOOGLE_AI_KEY=${GOOGLE_AI_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - FIREBASE_SERVICE_ACCOUNT_JSON=${FIREBASE_SERVICE_ACCOUNT_JSON}
      - GOOGLE_CREDENTIALS_JSON=${GOOGLE_CREDENTIALS_JSON:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_USER=${GITHUB_USER}
      - GITHUB_REPO=${GITHUB_REPO}
      - LOCAL_AI_BASE_URL=http://ollama:11434/v1
      - LOCAL_AI_MODEL_EXECUTIVE=${LOCAL_AI_MODEL_EXECUTIVE:-gemma4:e2b}
      - LOCAL_AI_MODEL_ANALYST=${LOCAL_AI_MODEL_ANALYST:-qwen2.5-coder:7b}
      - LOCAL_AI_MODEL_ENGINEER=${LOCAL_AI_MODEL_ENGINEER:-qwen2.5-coder:7b}
      - LOCAL_AI_MODEL_REASONER=${LOCAL_AI_MODEL_REASONER:-deepseek-r1:1.5b}
      - LOCAL_AI_MODEL_SENSES=${LOCAL_AI_MODEL_SENSES:-llava:7b}
      - LOCAL_AI_MODEL_FAST_ACTION=${LOCAL_AI_MODEL_FAST_ACTION:-llama3.2:1b}
      - DATABASE_URL=file:/data/db/custom.db
    volumes:
      - ./Aura-IA/firebase-key.json:/app/firebase-key.json
      - ./Aura-IA/credentials.json:/app/credentials.json
      - qapital-db:/data/db:ro
    depends_on:
      - ollama
    restart: "no"

  ollama:
    image: ollama/ollama:latest
    container_name: aura-ollama
    volumes:
      - ./ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: "no"

  ollama-setup:
    image: ollama/ollama:latest
    container_name: aura-ollama-setup
    volumes:
      - ./ollama-setup.sh:/ollama-setup.sh
    entrypoint: ["/bin/sh", "/ollama-setup.sh"]
    depends_on:
      - ollama

volumes:
  qapital-db:
    name: qapital-proyect_qapital-db
    external: true
