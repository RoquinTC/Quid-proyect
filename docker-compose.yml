services:
  qapital:
    build:
      context: ./Qapital-App
      dockerfile: Dockerfile
    ports:
      - "5678:3000"
    environment:
      - DATABASE_URL=file:/data/db/custom.db
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-me-in-production}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:5678}
    volumes:
      - ./Qapital-App/db:/data/db
    restart: unless-stopped

  aura-ia:
    build:
      context: ./Aura-IA
      dockerfile: Dockerfile
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ALLOWED_USER_IDS=${TELEGRAM_ALLOWED_USER_IDS}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GOOGLE_AI_KEY=${GOOGLE_AI_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - FIREBASE_SERVICE_ACCOUNT_JSON=${FIREBASE_SERVICE_ACCOUNT_JSON}
      - GOOGLE_CREDENTIALS_JSON=${GOOGLE_CREDENTIALS_JSON:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_USER=${GITHUB_USER}
      - GITHUB_REPO=${GITHUB_REPO}
      - LOCAL_AI_BASE_URL=http://ollama:11434/v1
      - LOCAL_AI_MODEL=llama3.2:3b
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: aura-ollama
    volumes:
      - ./ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  ollama-setup:
    image: ollama/ollama:latest
    container_name: aura-ollama-setup
    volumes:
      - ./ollama-setup.sh:/ollama-setup.sh
    entrypoint: [ "/bin/sh", "/ollama-setup.sh" ]
    depends_on:
      - ollama
