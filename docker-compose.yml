# ============================================================
# Quid App — Docker Compose (Production)
# ============================================================
# Levanta únicamente la App de Quid.
# Aura-Standalone tiene su propio docker-compose en f:\Proyectos\Aura-Standalone\
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: quid-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quid}
      POSTGRES_USER: ${POSTGRES_USER:-quid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quid-local-dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - quid-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quid} -d ${POSTGRES_DB:-quid}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  quid-app:
    build:
      context: ./Quid-App
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_VAPID_PUBLIC_KEY=${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
    container_name: quid-app
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://quid:quid-local-dev@postgres:5432/quid?schema=public}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-me-in-production}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_TRUSTHOST=true
      - NEXT_PUBLIC_VAPID_PUBLIC_KEY=${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-mailto:quid@app.com}
      - AURA_API_KEY=${AURA_API_KEY:-AuraSecretKey2026}
      - OLLAMA_URL=${OLLAMA_URL:-http://quid-ollama:11434/api}
      - AURA_MODEL=${AURA_MODEL:-hermes3:8b}
      - AUTH_COOKIE_SECURE=${AUTH_COOKIE_SECURE:-false}
      - CRON_SECRET=${CRON_SECRET:-local-cron-secret-change-me}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  quid-ollama:
    image: ollama/ollama:latest
    container_name: quid-ollama
    volumes:
      - quid-ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  quid-cron:
    image: curlimages/curl:8.11.1
    container_name: quid-cron
    depends_on:
      quid-app:
        condition: service_started
    environment:
      - CRON_SECRET=${CRON_SECRET:-local-cron-secret-change-me}
      - AURA_API_KEY=${AURA_API_KEY:-AuraSecretKey2026}
      - CRON_INTERVAL_SECONDS=${CRON_INTERVAL_SECONDS:-900}
    command:
      - sh
      - -c
      - |
        while true; do
          date
          curl -fsS "http://quid-app:3000/api/push/reminders?token=${CRON_SECRET:-local-cron-secret-change-me}" || true
          echo
          curl -fsS -X POST "http://aura-super-agent:3000/digest" -H "x-aura-token: ${AURA_API_KEY:-AuraSecretKey2026}" || true
          echo
          sleep "${CRON_INTERVAL_SECONDS:-900}"
        done
    restart: unless-stopped

volumes:
  quid-postgres-data:
  quid-ollama-data:
