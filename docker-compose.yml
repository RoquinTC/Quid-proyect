# ============================================================
# Quid App — Docker Compose (Production)
# ============================================================
# Este archivo SOLO levanta Quid App, que arranca automáticamente
# con Windows (restart: unless-stopped).
#
# Para Aura IA + Ollama, usar docker-compose.aura.yml
# que se levanta bajo demanda con: iniciar-aura.bat
# ============================================================

services:
  qapital:
    build:
      context: ./Qapital-App
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_VAPID_PUBLIC_KEY=${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
    container_name: qapital-app
    ports:
      - "5678:3000"
    environment:
      - DATABASE_URL=file:/data/db/custom.db
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-me-in-production}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:5678}
      - NEXT_PUBLIC_VAPID_PUBLIC_KEY=${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-mailto:quid@app.com}
    volumes:
      - qapital-db:/data/db
    restart: unless-stopped

volumes:
  qapital-db:
