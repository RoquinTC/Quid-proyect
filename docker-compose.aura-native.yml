# ============================================================
# Aura IA (Ollama NATIVO) — Docker Compose (Bajo Demanda)
# ============================================================
# Usa este archivo si Ollama ya está instalado NATIVAMENTE
# en Windows (con soporte GPU). Aura se conecta al Ollama
# nativo en lugar del contenedor Docker.
#
# Requisitos:
#   1. Ollama instalado en Windows: https://ollama.com/download
#   2. Modelos descargados: ollama pull gemma4:e2b, etc.
#   3. Ollama escuchando en http://host.docker.internal:11434
#
# Uso:
#   iniciar-aura.bat   (ya usa este archivo automáticamente)
# ============================================================

services:
  aura-ia:
    build:
      context: ./Aura-IA
      dockerfile: Dockerfile
    container_name: aura-ia
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ALLOWED_USER_IDS=${TELEGRAM_ALLOWED_USER_IDS}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GOOGLE_AI_KEY=${GOOGLE_AI_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - FIREBASE_SERVICE_ACCOUNT_JSON=${FIREBASE_SERVICE_ACCOUNT_JSON}
      - GOOGLE_CREDENTIALS_JSON=${GOOGLE_CREDENTIALS_JSON:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_USER=${GITHUB_USER}
      - GITHUB_REPO=${GITHUB_REPO}
      # Ollama nativo en el host Windows
      - LOCAL_AI_BASE_URL=http://host.docker.internal:11434/v1
      - LOCAL_AI_MODEL_EXECUTIVE=${LOCAL_AI_MODEL_EXECUTIVE:-gemma4:e2b}
      - LOCAL_AI_MODEL_ANALYST=${LOCAL_AI_MODEL_ANALYST:-llama3.2:3b}
      - LOCAL_AI_MODEL_ENGINEER=${LOCAL_AI_MODEL_ENGINEER:-qwen2.5-coder:7b}
      - LOCAL_AI_MODEL_REASONER=${LOCAL_AI_MODEL_REASONER:-deepseek-r1:1.5b}
      - LOCAL_AI_MODEL_SENSES=${LOCAL_AI_MODEL_SENSES:-llava:7b}
      - LOCAL_AI_MODEL_FAST_ACTION=${LOCAL_AI_MODEL_FAST_ACTION:-llama3.2:1b}
      - DATABASE_URL=file:/data/db/custom.db
    volumes:
      - ./Aura-IA/firebase-key.json:/app/firebase-key.json
      - ./Aura-IA/credentials.json:/app/credentials.json
      - qapital-db:/data/db:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: "no"

volumes:
  qapital-db:
    name: qapital-proyect_qapital-db
    external: true
